<!DOCTYPE html>
<html>
<head>
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(to right, #4facfe, #00f2fe);
        }

        /* HEADER */
        header {
            background: #222;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
        }

        /* MAIN CONTAINER */
        .container {
            width: 90%;
            max-width: 1000px;
            margin: 50px auto;
            display: flex;
            gap: 30px;
        }

        /* FORM BOX */
        .form-box {
            flex: 1;
            background: rgba(255,255,255,0.2);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            color: white;
            animation: slideIn 1s ease;
        }

        .form-box h2 {
            margin-bottom: 20px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            outline: none;
        }

        input:focus, textarea:focus {
            transform: scale(1.03);
        }

        button {
            background: #222;
            color: white;
            padding: 12px;
            border: none;
            width: 100%;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #000;
            transform: scale(1.05);
        }

        /* INFO BOX */
        .info-box {
            flex: 1;
            background: rgba(0,0,0,0.3);
            padding: 30px;
            border-radius: 15px;
            color: white;
            animation: slideIn 1.5s ease;
        }

        .info-box h2 {
            margin-bottom: 20px;
        }

        .info-box p {
            margin: 10px 0;
        }

        /* SOCIAL ICONS */
        .social a {
            display: inline-block;
            margin: 10px;
            color: white;
            text-decoration: none;
            transition: 0.3s;
        }

        .social a:hover {
            color: yellow;
        }

        /* ANIMATION */
        @keyframes slideIn {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* RESPONSIVE */
        @media(max-width: 768px) {
            .container {
                flex-direction: column;
            }
        }

        footer {
            text-align: center;
            padding: 15px;
            color: white;
        }

    </style>
</head>

<body>

<header>
    Contact Us
</header>

<div class="container">

    <!-- FORM -->
    <div class="form-box">
        <h2>Get In Touch</h2>

        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <textarea rows="5" placeholder="Your Message"></textarea>

        <button>Send Message</button>
    </div>

    <!-- INFO -->
    <div class="info-box">
        <h2>Contact Info</h2>

        <p>📧 Email: tanishamehra729@gmail.com</p>
        <p>📱 Phone: 9876543210</p>
        <p>📍 Location: India</p>

        <h3>Follow Us</h3>

        <div class="social">
            <a href="#">Instagram</a>
            <a href="#">YouTube</a>
            <a href="#">LinkedIn</a>
        </div>
    </div>

</div>

<footer>
    © 2026 Your Website | All Rights Reserved
</footer>

</body>
</html>
